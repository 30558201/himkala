:root {

--primary-light: #125740;
--accent: #D4AF37;
--bg-body: #f8fafc;

--text-main: #0f172a;
--text-sub: #64748b;
--border-light: #f1f5f9;
--border-dark: #e2e8f0;
--radius-sm: 8px;
--radius-md: 16px;
--radius-lg: 24px;
--shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
--shadow-md: 0 8px 24px rgba(10, 58, 42, 0.08);
--shadow-lg: 0 16px 32px rgba(10, 58, 42, 0.12);
--safe-top: env(safe-area-inset-top, 0px);
--safe-bottom: env(safe-area-inset-bottom, 0px);
--header-height: calc(64px + var(--safe-top));
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
font-family: 'Inter', sans-serif;
background-color: var(--bg-body);
color: var(--text-main);

overflow-x: hidden;

}
h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
a { text-decoration: none; color: inherit; }
button, input { font-family: inherit; outline: none; border: none; background: transparent; }
.ripple-wrapper { position: relative; overflow: hidden; }
.ripple {
position: absolute;
border-radius: 50%;
transform: scale(0);
animation: ripple-anim 0.6s linear;
background-color: rgba(0, 0, 0, 0.1);
pointer-events: none;
}
.ripple-light { background-color: rgba(255, 255, 255, 0.3); }
@keyframes ripple-anim {
to { transform: scale(4); opacity: 0; }
}
.skeleton {
background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
background-size: 200% 100%;
animation: shimmer 1.5s infinite linear;
}
@keyframes shimmer {
0% { background-position: 200% 0; }
100% { background-position: -200% 0; }
}

</head>

{ id: 2, code: "HK-002", name: "Traditional Galgal Pickle", category: "Food", price: 170, img: "https://lh3.googleusercontent.com/pw/AP1GczN62jev1vn3AYJhhecDbCjS8H0JLKl4_jW978sxW6ohbA9X9ZJHh-Fw4ExPEAEQTTwGj2Hv7pEbg5v8ZGkd4chPclw0ZtiLNgyEDVRb6TgdTJZe-NX1xwCTibNKyHW11s4Ooi1HPDuxmL0-gYIQiC4=w924-h616-s-no-gm?authuser=0", desc: "Handcrafted Galgal pickle made from fresh Himalayan citrus fruit. Prepared using traditional spices and natural fermentation techniques. Completely free from artificial preservatives or chemicals. A perfect accompaniment to traditional meals. Includes complimentary Free Delivery. Available Sizes and Prices: 250g (₹170), 500g (₹260), 1000g (₹400)." },

{ id: 4, code: "HK-004", name: "Chamba Kadhai Saree", category: "Embroidery", price: 12999, img: "https://images.unsplash.com/photo-1610189014603-90d592a34479?w=600&q=80", desc: "Premium saree featuring traditional Chamba hand embroidery work. Elegant design suitable for cultural occasions and special events. Includes exclusive Free Delivery." },
{ id: 5, code: "HK-005", name: "Pure Coconut & Almond Oil Soap (70g)", category: "Soaps", price: 170, img: "https://images.unsplash.com/photo-1600857544200-b2f666a9a2ec?w=600&q=80", desc: "Handcrafted natural soap made using pure coconut oil and almond oil. Gentle on skin and suitable for daily use. Enjoy our standard Free Delivery." }

const appState = {
activeCategory: localStorage.getItem('hk_category') || 'All',
searchQuery: '',

savedScroll: 0
};
const grid = document.getElementById('product-grid');
const searchInput = document.getElementById('searchInput');
const categoryTitle = document.getElementById('category-title');
const itemCountTitle = document.getElementById('item-count');

const pdpContent = document.getElementById('pdpContent');

const sidebarBackdrop = document.getElementById('sidebarBackdrop');

const formatPrice = (price) => `₹${price.toLocaleString('en-IN')}`;
const debounce = (func, delay) => {
let timeoutId;
return (...args) => {
clearTimeout(timeoutId);
timeoutId = setTimeout(() => func.apply(null, args), delay);
};
};
const createRipple = (event) => {
const button = event.currentTarget;
const circle = document.createElement("span");
const diameter = Math.max(button.clientWidth, button.clientHeight);
const radius = diameter / 2;
circle.style.width = circle.style.height = `${diameter}px`;
const rect = button.getBoundingClientRect();
const clientX = event.touches ? event.touches[0].clientX : event.clientX;
const clientY = event.touches ? event.touches[0].clientY : event.clientY;
circle.style.left = `${clientX - rect.left - radius}px`;
circle.style.top = `${clientY - rect.top - radius}px`;
circle.classList.add("ripple");
if (button.classList.contains("ripple-light")) circle.classList.add("ripple-light");
const existingRipple = button.querySelector(".ripple");
if (existingRipple) existingRipple.remove();
button.appendChild(circle);
setTimeout(() => circle.remove(), 600);
};
const attachRipples = () => {
document.querySelectorAll('.ripple-wrapper').forEach(btn => {
btn.removeEventListener('mousedown', createRipple);
btn.removeEventListener('touchstart', createRipple);
btn.addEventListener('mousedown', createRipple);
btn.addEventListener('touchstart', createRipple, {passive: true});
});
};
if (!history.state || history.state.page !== 'home') {
history.replaceState({ page: 'home' }, '', window.location.pathname);
}
window.addEventListener('popstate', (e) => {
closeSidebar();
if (!e.state || e.state.page === 'home') {
closePDPInternal();
} else if (e.state.page === 'pdp') {
const product = productsDB.find(p => p.code === e.state.id);
if(product) openPDPInternal(product, false);
}
});
function handleBack() {
if (history.state && history.state.page === 'pdp') {
history.back();
} else {
closePDPInternal();
history.replaceState({ page: 'home' }, '', window.location.pathname);
}
}
function toggleSidebar() {
if(sidebar.classList.contains('active')) closeSidebar();
else {
sidebar.classList.add('active');
sidebarBackdrop.classList.add('active');
}
}
function closeSidebar() {
sidebar.classList.remove('active');
sidebarBackdrop.classList.remove('active');
}
function normalizeString(str) {
return str.toLowerCase().replace(/[^a-z0-9]/g, '');
}
function getRelevantCategory(query) {
const q = query.toLowerCase();
if (q.includes('soap') || q.includes('wash') || q.includes('bath')) return 'Soaps';
if (q.includes('food') || q.includes('eat') || q.includes('tea') || q.includes('jam')) return 'Food';
if (q.includes('art') || q.includes('embroidery') || q.includes('shawl') || q.includes('wear')) return 'Embroidery';
return null;
}
function renderProducts() {
const q = appState.searchQuery.toLowerCase().trim();
const searchTerms = q.split(' ').filter(t => t.length > 0);
const smartCategory = q.length > 2 ? getRelevantCategory(q) : null;
const filtered = productsDB.filter(p => {
let matchesSearch = true;
if (searchTerms.length > 0) {
matchesSearch = searchTerms.every(term => 
p.name.toLowerCase().includes(term) || 
p.code.toLowerCase().includes(term) || 
p.category.toLowerCase().includes(term) ||
normalizeString(p.name).includes(normalizeString(term))
);
if (!matchesSearch && smartCategory && p.category === smartCategory) {
matchesSearch = true;
}
}
const matchesCategory = (appState.activeCategory === 'All') ? true : (p.category === appState.activeCategory);
return matchesSearch && matchesCategory;
});
itemCountTitle.innerText = `${filtered.length} items`;
grid.innerHTML = '';
if(filtered.length === 0) {
grid.innerHTML = `
<div class="empty-state">
<i class="ri-search-eye-line"></i>
<h3 class="brand-font" style="color: var(--primary); margin-bottom: 8px;">No results found</h3>
<p>We couldn't find anything matching your search. Try different keywords.</p>
</div>`;
return;
}
const fragment = document.createDocumentFragment();
filtered.forEach(p => {
const card = document.createElement('div');
card.className = 'product-card ripple-wrapper';
card.onclick = (e) => {
createRipple(e);
setTimeout(() => openPDP(p), 120);
};
card.innerHTML = `
<div class="product-img-wrapper skeleton">
<img src="${p.img}" alt="${p.name}" loading="lazy" onload="this.classList.add('loaded'); this.parentElement.classList.remove('skeleton');">
</div>
<div class="product-info">
<span class="product-code-mini">${p.code}</span>
<h3 class="product-title">${p.name}</h3>
<div class="product-price">
${formatPrice(p.price)}
<div class="add-btn"><i class="ri-add-line"></i></div>
</div>
</div>
`;
fragment.appendChild(card);
});
requestAnimationFrame(() => {
grid.appendChild(fragment);
attachRipples();
});
}
function openPDPInternal(product, pushHistory = true) {
appState.currentProduct = product;
if(pushHistory && (!history.state || history.state.id !== product.code)) {
appState.savedScroll = window.scrollY;
history.pushState({ page: 'pdp', id: product.code }, '', `#${product.code}`);
}
pdpContent.innerHTML = `
<div class="pdp-image-container skeleton">
<img src="${product.img}" class="pdp-image" alt="${product.name}" onload="this.parentElement.classList.remove('skeleton');" style="opacity: 1;">
</div>
<div class="pdp-details">
<div class="pdp-header">
<div>
<span class="pdp-code">${product.code}</span>
<h1 class="pdp-title">${product.name}</h1>
</div>
</div>
<div class="pdp-price">
${formatPrice(product.price)} 
<span class="pdp-tax-label">Incl. taxes</span>
</div>
<div class="premium-badges">
<div class="badge"><i class="ri-verified-badge-fill"></i> Authentic</div>
<div class="badge"><i class="ri-leaf-fill"></i> Natural</div>
<div class="badge"><i class="ri-shield-check-fill"></i> Assured</div>
</div>
<div class="pdp-section">
<h3>About the Creation</h3>
<p class="pdp-desc">${product.desc}</p>
</div>
<div class="pdp-section" style="margin-bottom: 60px;">
<h3>Premium Assurance</h3>
<div class="feature-row">
<div class="feature-icon"><i class="ri-truck-line"></i></div>
<div class="feature-text">
<h4>Express Delivery</h4>
<p>Dispatched securely within 24 hours.</p>
</div>
</div>
<div class="feature-row">
<div class="feature-icon"><i class="ri-refund-2-line"></i></div>
<div class="feature-text">
<h4>Secure Returns</h4>
<p>7-day hassle-free return policy.</p>
</div>
</div>
</div>
</div>
`;
pdpOverlay.classList.add('active');
}
function openPDP(product) {
openPDPInternal(product, true);
}
function closePDPInternal() {
pdpOverlay.classList.remove('active');
appState.currentProduct = null;
setTimeout(() => {
if(appState.savedScroll > 0) {
window.scrollTo(0, appState.savedScroll);
}
}, 50);
}
function updateCategoryUI() {
navItems.forEach(n => {
n.classList.remove('active');
if(n.dataset.category === appState.activeCategory) n.classList.add('active');
});
const catNames = { 'All': 'Discover', 'Food': 'Gourmet', 'Embroidery': 'Artisan', 'Soaps': 'Wellness' };
categoryTitle.innerText = appState.searchQuery ? "Search Results" : (appState.activeCategory === 'All' ? "Our Collection" : catNames[appState.activeCategory]);
}
navItems.forEach(item => {
item.addEventListener('click', () => {
const selectedCat = item.dataset.category;
if(appState.activeCategory === selectedCat && !appState.searchQuery) return;
appState.activeCategory = selectedCat;
appState.searchQuery = '';
searchInput.value = '';
localStorage.setItem('hk_category', selectedCat);
updateCategoryUI();
renderProducts(); 
window.scrollTo({top: 0, behavior: 'smooth'});
});
});
const handleSearch = debounce((e) => {
const val = e.target.value;
appState.searchQuery = val;
if(val) {
appState.activeCategory = 'All';
} else {
appState.activeCategory = localStorage.getItem('hk_category') || 'All';
}
updateCategoryUI();
renderProducts();
}, 250);
searchInput.addEventListener('input', handleSearch);
btnBuyWhatsapp.addEventListener('click', () => {
if(!appState.currentProduct) return;
const phoneNumber = "917018760836";
const message = encodeURIComponent(`Hello HimKala,\n\nI am interested in purchasing:\n*${appState.currentProduct.name}*\nCode: ${appState.currentProduct.code}\nPrice: ${formatPrice(appState.currentProduct.price)}\n\nPlease assist me with the checkout process.`);
window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
});
window.addEventListener('DOMContentLoaded', () => {
updateCategoryUI();
renderProducts();
attachRipples();
});
</script>
</body>
</html>
